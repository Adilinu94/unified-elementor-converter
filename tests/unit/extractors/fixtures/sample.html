<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --primary-color: #2563eb;
      --text-color: #1a1a2e;
      --bg-color: #ffffff;
    }
    body { font-family: 'Inter', sans-serif; color: #1a1a2e; }
    .hero { background-color: #2563eb; padding: 80px 20px; }
    .hero h1 { font-size: 48px; color: #ffffff; }
    .services { display: flex; gap: 24px; }
    .services h2 { font-size: 32px; color: #1a1a2e; }
    .btn { background: #2563eb; color: #ffffff; padding: 12px 24px; }
    .footer { background: #1a1a2e; color: #ffffff; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Build Amazing Websites</h1>
    <p>Convert any design to Elementor in seconds.</p>
    <a href="#start" class="btn">Get Started</a>
  </section>
  <section class="services" style="display: flex; gap: 24px">
    <h2>Our Services</h2>
    <p>We provide top-notch conversion services.</p>
    <img src="https://example.com/img1.png" alt="Service 1">
  </section>
  <section class="footer">
    <p>© 2026 Example Corp</p>
  </section>
</body>
</html>
